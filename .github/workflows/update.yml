name: Update tracker

# Runs the full pipeline and publishes the refreshed dashboard.
#
# 06:30 UTC daily — early enough that the page is current before the US working
# day, late enough to pick up anything agencies posted the previous afternoon.
# GitHub schedules are best-effort and can lag by several minutes under load;
# that is fine for a daily regulatory tracker.
on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch: {}      # lets you trigger a run by hand from the Actions tab
  # Deploy on push as well. Without this, code changes sat in the repo while the
  # published site stayed on whatever the last scheduled run produced — including
  # a search bug that had already been fixed in the repo. Classification is
  # incremental, so a push with no new agency items costs nothing.
  push:
    branches: [main]
    paths-ignore:
      - "README.md"          # docs-only edits don't need a redeploy

permissions:
  contents: write            # needed to commit the refreshed store and dashboard

concurrency:
  group: update-tracker      # never let two runs fight over store.json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch from agency sources
        run: python fetcher.py

      - name: Classify new items
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Match Federal Register deadlines
        run: python deadlines.py

      - name: Build dashboard
        run: python dashboard.py

      # Report only — never fails this job. Publishing must not be blocked by a
      # single flaky agency site, so the gate runs as a separate job after the
      # deploy has already happened.
      - name: Check source health
        run: |
          python health.py --report-only | tee health.txt
          {
            echo "## Source health"
            echo '```'
            cat health.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: |
            health.json
            fetch_report.json
          retention-days: 90

      - name: Commit refreshed data
        run: |
          git config user.name "regwatch-bot"
          git config user.email "actions@github.com"
          git add store.json dashboard.html
          # Nothing to do when no new items were published that day.
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Update tracker data ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Assemble the published site
        # Pages serves index.html at the root, so the dashboard is copied to that
        # name. Keeping the build output as dashboard.html locally means the
        # local workflow is unchanged.
        run: |
          mkdir -p site
          cp dashboard.html site/index.html
          # The social preview card must be published too — og:image points at an
          # absolute URL on this site, and a 404 there means no LinkedIn preview.
          cp og-image.png site/og-image.png
          # Icons and manifest, referenced from <head>. Listed explicitly rather
          # than globbed so a missing one fails the build loudly instead of
          # publishing a page with a silently broken icon.
          cp favicon.ico site/favicon.ico
          cp icon-16.png site/icon-16.png
          cp icon-32.png site/icon-32.png
          cp icon-192.png site/icon-192.png
          cp icon-512.png site/icon-512.png
          cp icon-maskable-512.png site/icon-maskable-512.png
          cp apple-touch-icon.png site/apple-touch-icon.png
          cp site.webmanifest site/site.webmanifest
          # CFR text for the "Ask the regulations" panel. Retrieval runs in the
          # browser, so this must be published or the panel can only draw on the
          # tracked updates. Regenerate with: python ecfr_corpus.py
          cp corpus.json site/corpus.json
          # Subscribable calendar feed of upcoming deadlines, written by
          # dashboard.py in the build step above. Readers subscribe to this URL
          # once and new comment periods appear in their calendar automatically.
          cp deadlines.ics site/deadlines.ics

      - name: Publish to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Runs last, on purpose. The dashboard is already built, committed and
  # published by this point, so a broken source never blocks the site — it just
  # turns this run red, which is what sends the notification email.
  #
  # Only BROKEN sources fail it. A source that has merely gone quiet is reported
  # but does not fail: a daily check that cries wolf is a daily check you learn
  # to ignore.
  health-gate:
    needs: [update, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: health-report

      - name: Fail if any source is broken
        run: |
          python - <<'PY'
          import json, sys
          h = json.load(open("health.json"))
          broken = [s for s in h["sources"] if s["status"] == "BROKEN"]
          quiet = [s for s in h["sources"] if s["status"] == "QUIET"]
          for s in quiet:
              print(f"::warning title=Source quiet::{s['source']}: {s['detail']}")
          for s in broken:
              print(f"::error title=Source broken::{s['source']}: {s['detail']}")
          if broken:
              names = ", ".join(s["source"] for s in broken)
              sys.exit(f"\n{len(broken)} source(s) broken: {names}\n"
                       "The site published normally; these sources are missing from it.")
          print(f"All sources healthy ({len(quiet)} quiet).")
          PY
